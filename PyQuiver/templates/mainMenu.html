<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuiverHS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #c4dfd6;
            margin: 0;
            padding: 0;
        }
        .title-bar {
            background-color: white;
            padding: 10px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #ccc;
        }
        .container {
            margin-top: 50px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
        }
        .button {
            background-color: #4d7c7b;
            color: white;
            font-size: 18px;
            text-decoration: none;
            padding: 50px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .button:hover {
            background-color: #3b6362;
        }
    </style>
</head>
<body>

    <div class="title-bar">QuiverHS</div>
    
    <div class="container">
        <h2>Welcome to QuiverHS!</h2>
        <div class="buttons">
            <a href="{{ url_for('kie') }}" class="button">KIE Calculations</a>
            <a href="{{ url_for('eie') }}" class="button">EIE Calculations</a>
            <!-- <div class="button">KIE Calculations</div>
            <div class="button">EIE Calculations</div> -->
        </div>
    </div>

</body>
</html>
