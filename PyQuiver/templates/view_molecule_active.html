<!DOCTYPE html>
<html>
<head>
    <title>Gaussian Molecule Viewer</title>
    <script src="https://3dmol.org/build/3Dmol-min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #viewer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <script>
        window.onload = function() {
            const xyzData = `{{ xyz_data | safe }}`.trim();

            if (xyzData.length > 0) {
                const viewer = $3Dmol.createViewer("viewer", {
                    backgroundColor: "white"
                });

                viewer.addModel(xyzData, "xyz");
                viewer.setStyle({}, {stick: {}});

                // Add labels
                const lines = xyzData.split("\n").slice(2);
                lines.forEach((line, index) => {
                    const parts = line.trim().split(/\s+/);
                    if (parts.length >= 4) {
                        const [atom, x, y, z] = parts;
                        viewer.addLabel(`${atom}${index + 1}`, {
                            position: { x: +x, y: +y, z: +z },
                            fontSize: 12,
                            fontColor: "black",
                            backgroundColor: "white"
                        });
                    }
                });

                viewer.zoomTo();  // Zoom and center
                viewer.render();
            } else {
                console.error("XYZ Data is empty.");
            }
        };
    </script>
</body>
</html>
