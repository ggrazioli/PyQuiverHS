<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIE Calculations</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #c7ded3;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 500px;
            margin: auto;
            background: #c7ded3;
            padding: 20px;
            border-radius: 10px;
        }
        button {
            background-color: #4a7b74;
            color: white;
            border: none;
            padding: 10px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #3d615d;
        }
        input {
            width: 150px;
            padding: 5px;
            margin: 5px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #333;
            background-color: black;
            color: white;
        }
        .label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('home') }}">Back to Home</a>
        <h2>KIE Calculations!</h2>
        
        <form action="/view_molecule" method="post" enctype="multipart/form-data" target="_blank">
            <div class="label">
                <span>Molecule to view</span>
                <input type="file" name="file" accept=".out,.log" required>
            </div>
            <button type="submit">View!</button>
        </form>
    </div>
</body>
</html>
