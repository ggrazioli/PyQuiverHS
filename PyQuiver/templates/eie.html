<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EIE Calculations</title>
  <style>
    :root {
      --primary: #3498db;
      --hover: #2980b9;
      --bg: #f4f6f8;
      --white: #ffffff;
      --text: #2c3e50;
      --error: #e74c3c;
      --radius: 12px;
      --transition: 0.3s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg);
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      background: var(--white);
      padding: 30px 40px;
      border-radius: var(--radius);
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      animation: fadeIn 0.5s ease;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: var(--text);
      font-size: 24px;
    }

    a {
      display: inline-block;
      margin-bottom: 15px;
      text-decoration: none;
      color: var(--primary);
      font-weight: 500;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="file"] {
      padding: 10px 12px;
      border: 1px solid #dfe6e9;
      border-radius: var(--radius);
      background: #f8f9fa;
      font-size: 14px;
      transition: border var(--transition), box-shadow var(--transition);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #fff;
      box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.15);
    }

    small {
      color: var(--error);
      font-size: 12px;
      margin-top: 4px;
      transition: opacity var(--transition);
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform 0.2s ease;
    }

    button:hover {
      background: var(--hover);
      transform: translateY(-1px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="{{ url_for('home') }}">← Back to Home</a>
    <h2>EIE Calculations</h2>

    <form action="/eie" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="config_file">Configuration File</label>
        <input type="file" name="config_file" accept=".config" required />
      </div>

      <div class="form-group">
        <label for="gaussian">Gaussian File</label>
        <input type="file" name="gaussian" accept=".out,.log" required />
      </div>

      <div class="form-group">
        <label for="temperature">Temperature (K)</label>
        <input type="text" name="temperature" />
        <small>Either one temperature or a range with 2 temperatures. Separate temperatures with a comma.</small>
      </div>

      <div class="form-group">
        <label for="temp_increment">Temperature Increment</label>
        <input type="text" name="temp_increment" value="1" />
        <small>Only for a temperature range.</small>
      </div>

      <button type="submit">Calculate!</button>
    </form>
  </div>

</body>
</html>
