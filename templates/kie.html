<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KIE Calculations</title>
  <style>
    :root {
      --primary: #2d9cdb;
      --bg: #f4f6f8;
      --white: #ffffff;
      --gray: #e0e0e0;
      --dark: #333;
      --text: #4f4f4f;
      --error: #eb5757;
      --transition: 0.25s ease;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--white);
      width: 100%;
      max-width: 500px;
      padding: 30px 28px;
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      transition: transform var(--transition);
      animation: fadeIn 0.4s ease-out;
    }

    .container:hover {
      transform: translateY(-4px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    a {
      color: var(--primary);
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 16px;
      transition: color var(--transition);
    }

    a:hover {
      color: #1a7bbd;
    }

    h2 {
      font-size: 24px;
      color: var(--dark);
      margin-bottom: 24px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="file"] {
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid var(--gray);
      border-radius: var(--radius);
      background: #fafafa;
      transition: all var(--transition);
    }

    input:focus {
      outline: none;
      background: var(--white);
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(45, 156, 219, 0.15);
    }

    small {
      color: var(--error);
      font-size: 12px;
      margin-top: 4px;
      transition: opacity var(--transition);
    }

    button {
      background: var(--primary);
      color: var(--white);
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform 0.2s ease;
    }

    button:hover {
      background: #1a7bbd;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="{{ url_for('home') }}">&larr; Back to Home</a>
    <h2>KIE Calculations</h2>

    <form action="/kie" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="config_file">Configuration File</label>
        <input type="file" name="config_file" accept=".config" required />
      </div>

      <div class="form-group">
        <label for="ground_state_file">Ground State File</label>
        <input type="file" name="ground_state_file" accept=".out,.log" required />
      </div>

      <div class="form-group">
        <label for="transition_state_file">Transition State File</label>
        <input type="file" name="transition_state_file" accept=".out,.log" required />
      </div>

      <div class="form-group">
        <label for="temperature">Temperature (K)</label>
        <input type="text" name="temperature" />
        <small>Either one temperature or a range with two temperatures. Separate temperatures with a comma.</small>
      </div>

      <div class="form-group">
        <label for="temp_increment">Temperature Increment</label>
        <input type="text" name="temp_increment" value="1" />
        <small>Only for a temperature range.</small>
      </div>

      <!-- <div class="form-group">
        <label for="scaling_factor">Frequency Scaling Factor</label>
        <input type="text" name="scaling_factor" value="1.0" />
      </div> -->

      <button type="submit">Calculate!</button>
    </form>
  </div>
</body>
</html>
