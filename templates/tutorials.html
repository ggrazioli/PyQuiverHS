<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuiverHS Tutorials</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #3498db;
      --hover: #2980b9;
      --bg: #f4f6f8;
      --white: #ffffff;
      --text: #2c3e50;
      --radius: 12px;
      --transition: 0.3s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .title-bar {
      background-color: var(--white);
      padding: 16px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      background-color: var(--white);
      border-right: 1px solid #ddd;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeIn 0.4s ease;
    }

    .sidebar button {
      background: none;
      border: none;
      font-size: 16px;
      text-align: left;
      padding: 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .sidebar button:hover {
      background-color: var(--hover);
      color: white;
    }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-size: 20px;
      color: var(--primary);
    }

    .content {
      flex: 1;
      padding: 40px 30px;
      overflow-y: auto;
      background-color: var(--bg);
      animation: fadeIn 0.6s ease;
    }

    .content h1, .content h2, .content h3 {
      margin-top: 20px;
    }

    .content p {
      margin: 10px 0;
      line-height: 1.6;
    }

    pre {
      background: #f0f0f0;
      padding: 12px;
      border-radius: var(--radius);
      overflow-x: auto;
    }

    code {
      background: #eee;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: monospace;
    }

    .back-link {
      margin-bottom: 16px;
      display: inline-block;
      text-decoration: none;
      color: var(--primary);
      font-size: 14px;
      transition: color var(--transition);
    }

    .back-link:hover {
      color: var(--hover);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        overflow-x: auto;
      }

      .sidebar button {
        flex: 1;
        white-space: nowrap;
        justify-content: center;
      }
    }
    .content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin: 20px 0;
      display: block;
    }
  </style>
</head>
<body>

  <div class="title-bar">QuiverHS</div>

  <div class="layout">
    <div class="sidebar">
      <button onclick="loadTutorial('{{ url_for("serve_tutorial", filename="TUTORIAL.md") }}')">
        <span class="material-symbols-outlined">school</span> Introduction
      </button>
      <button onclick="loadTutorial('{{ url_for("serve_tutorial", filename="KIE.md") }}')">
        <span class="material-symbols-outlined">calculate</span> Kinetic Isotope Effects
      </button>
      <button onclick="loadTutorial('{{ url_for("serve_tutorial", filename="EIE.md") }}')">
        <span class="material-symbols-outlined">functions</span> Equilibrium Isotope Effects
      </button>
      <button onclick="loadTutorial('{{ url_for("serve_tutorial", filename="CONFIG.md") }}')">
        <span class="material-symbols-outlined">settings</span> Configuration File Generation
      </button>
      <button onclick="loadTutorial('{{ url_for("serve_tutorial", filename="MOLECULE.md") }}')">
        <span class="material-symbols-outlined">science</span> Molecule Viewer
      </button>
      <button onclick="downloadTutorial()">
        <span class="material-symbols-outlined">download</span> Download tutorial files.
      </button>
    </div>

    <div class="content" id="tutorial-content">
      <a href="{{ url_for('home') }}" class="back-link">&larr; Back to Main Menu</a>
      <h2>Welcome</h2>
      <p>Select a tutorial from the left to get started.</p>
    </div>
  </div>

  <script>
    function loadTutorial(file) {
      fetch(file)
        .then(response => {
          if (!response.ok) throw new Error("Failed to load " + file);
          return response.text();
        })
        .then(md => {
          const html = marked.parse(md);
          document.getElementById('tutorial-content').innerHTML = `
            <a href="{{ url_for('home') }}" class="back-link">&larr; Back to Main Menu</a>
            ${html}
          `;
        })
        .catch(error => {
          document.getElementById('tutorial-content').innerHTML = `
            <p>Error loading content: ${error.message}</p>
          `;
        });
    }
    function downloadTutorial() {
      const link = document.createElement('a');
      link.href = '/tutorials/download';
      link.download = 'tutorial_files.zip'; // Optional – works better if the server sets headers
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>

</body>
</html>
