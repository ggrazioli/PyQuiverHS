<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background: linear-gradient(135deg, #E9FFFF, #000046);
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* old dark blue on landing 0055A2 */

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 400px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 10px 0;
        }

        .tagline {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .enter-btn {
            padding: 12px 25px;
            background: white;
            color: #1e3c72;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .enter-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <img src="{{ url_for('static', filename='images/pyquiverHSlogoTransparent.png') }}" class="logo">

    <h1>PyQuiver HS</h1>

    <div class="tagline">
        Isotope effect calculations with separable enthalpic and entropic contributions.
    </div>

    <a href="{{ url_for('auth.login') }}" class="enter-btn">
        Enter
    </a>
</div>

</body>
</html>
