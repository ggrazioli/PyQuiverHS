<!DOCTYPE html>
<html>
<head>
    <title>Gaussian Molecule Viewer</title>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
</head>
<body>
    <div id="viewer" style="width: 1200px; height: 800px;"></div>
    <script>
        window.onload = function() {
            const xyzData = `{{ xyz_data | safe }}`.trim();
            if (xyzData.length > 0) {
                const viewer = $3Dmol.createViewer("viewer", { backgroundColor: "white" });

                // Add the molecule model
                viewer.addModel(xyzData, "xyz");
                viewer.setStyle({}, {stick: {}});

                // Add labels for each atom
                let lines = xyzData.split("\n").slice(2); // Ignore first two lines (XYZ format)
                lines.forEach((line, index) => {
                    let parts = line.trim().split(/\s+/);
                    if (parts.length >= 4) {
                        let atomType = parts[0]; // Atom symbol (C, O, H, etc.)
                        let x = parseFloat(parts[1]);
                        let y = parseFloat(parts[2]);
                        let z = parseFloat(parts[3]);
                        let label = `${atomType}${index + 1}`; // AtomType + Index

                        viewer.addLabel(label, {
                            position: {x, y, z},
                            fontSize: 12,
                            fontColor: "black",
                            backgroundColor: "white"
                        });
                    }
                });

                viewer.zoomTo();
                viewer.render();
            } else {
                console.error("XYZ Data is empty, molecule cannot be displayed.");
            }
        };
    </script>
</body>
</html>
